<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favour Samuel</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="javascript/main.js"></script>
    
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased scroll-smooth">
      <!-- Navigation -->
    <nav class="fixed w-full bg-slate-900/80 backdrop-blur-md border-b border-slate-800 z-50">
        
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="#" class="text-xl font-bold text-slate-50">FS</a>
                
                <div class="flex items-center gap-6">
                    <!-- Desktop Menu -->
                    <div class="hidden md:flex gap-6 text-sm font-medium">
                        <a href="#contact" class="text-slate-300 hover:text-white transition-colors">Home</a>
                        <a href="#about" class="text-slate-300 hover:text-white transition-colors">About</a>
                        <a href="#projects" class="text-slate-300 hover:text-white transition-colors">Projects</a>
                        <a href="#skills" class="text-slate-300 hover:text-white transition-colors">Skills</a>
                        <a href="#contact" class="text-slate-300 hover:text-white transition-colors">Contact</a>
                    </div>
                    
                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">
                        <span id="themeIcon">🌙</span>
                    </button>

                     <!-- Hamburger Button (Mobile) -->
                    <button id="hamburgerBtn" class="md:hidden flex flex-col justify-center items-center w-8 h-8 gap-1.5 group" aria-label="Toggle menu" aria-expanded="false">
                        <span class="hamburger-line w-6 h-0.5 bg-slate-300 transition-all duration-300 ease-out group-hover:bg-white"></span>
                        <span class="hamburger-line w-6 h-0.5 bg-slate-300 transition-all duration-300 ease-out group-hover:bg-white"></span>
                        <span class="hamburger-line w-6 h-0.5 bg-slate-300 transition-all duration-300 ease-out group-hover:bg-white"></span>
                    </button>
                </div>
            </div>
        </div>

         <!-- Mobile Menu Overlay -->
        <div id="mobileMenu" class="md:hidden fixed inset-0 top-16 bg-slate-900/95 backdrop-blur-lg transform translate-x-full transition-transform duration-300 ease-in-out z-40">
            <div class="flex flex-col items-center justify-center h-full gap-8 text-lg font-medium">
                <a href="#about" class="mobile-nav-link text-slate-300 hover:text-white transition-colors transform hover:scale-110 duration-200">About</a>
                <a href="#projects" class="mobile-nav-link text-slate-300 hover:text-white transition-colors transform hover:scale-110 duration-200">Projects</a>
                <a href="#skills" class="mobile-nav-link text-slate-300 hover:text-white transition-colors transform hover:scale-110 duration-200">Skills</a>
                <a href="#contact" class="mobile-nav-link text-slate-300 hover:text-white transition-colors transform hover:scale-110 duration-200">Contact</a>
            </div>
        </div>
    </nav>
